<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="theme-color" content="#ff6f61">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CC Spinner">
  
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <title>CC Spinner</title>

<link rel="stylesheet" href="styles.css">

</head>
<body>

<div id="homeScreen" class="view-container active">
    <h1 class="app-title">CC Study Tool</h1>
    <div class="mode-cards">
        <div class="mode-card" onclick="switchMode('spinner')">
            <div class="icon">🎯</div>
            <h3>Spinner</h3>
            <p>Randomized practice</p>
        </div>
        <div class="mode-card" onclick="switchMode('review')">
            <div class="icon">📚</div>
            <h3>Review</h3>
            <p>Browse specific lessons</p>
        </div>
    </div>
</div>

<div id="spinnerContainer" class="view-container">
<button class="circleBtn back-to-home" onclick="switchMode('home')" aria-label="Home">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
</button>
  
<div class="rollerBox">
  <div class="slot">
    <div class="reel" id="subjectReel"></div>
  </div>
  <div class="slot">
    <div class="reel" id="weekReel"></div>
  </div>
</div>

<div id="prompt"></div>

<div id="answerContainer">
  <button id="toggleAnswer" onclick="toggleAnswer()">▼ Show Answer ▼</button>
  <div id="answerContent"></div>
</div>

<button id="editBtn" onclick="toggleGrid()">Lesson Settings</button>

<div class="version-tag">v<span id="app-version">1.0.4</span></div>

<div class="control-row">
  <button id="undoBtn" onclick="undoLastSpin()" disabled>
    <svg viewBox="0 0 100 100">
      <path id="undoCurve" d="M 30,30 A 50,50 0 0 1 70,70" fill="transparent" />
      <text>
        <textPath xlink:href="#undoCurve" startOffset="50%" text-anchor="middle">undo</textPath>
      </text>
    </svg>
  </button>

  <button id="spinBtn" onclick="spinBoth()">
    <svg viewBox="0 0 100 100">
      <path id="spinCurve" d="M 30,70 A 50,50 0 0 1 70,30" fill="transparent" />
      <text>
        <textPath xlink:href="#spinCurve" startOffset="50%" text-anchor="middle">SPIN</textPath>
      </text>
    </svg>
  </button>
</div>
</div>

<div id="reviewContainer" class="view-container">
<button class="circleBtn back-to-home" onclick="switchMode('home')" aria-label="Home">
    <svg viewBox="0 0 24 24" width="22" height="22" fill="white">
        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
    </svg>
</button>
    
    <div class="review-layout">
        <div class="review-controls">
            <div class="ctrl-group">
                <span style="font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Subject</span>
                <div class="slot review-slot" id="scrollSubject" onclick="openPicker('subject')">
                    <div class="reel" id="reviewSubjectReel"></div>
                </div>
            </div>

            <div class="ctrl-group">
                <span style="font-size: 13px; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Week</span>
                <div class="slot review-slot" id="scrollWeek" onclick="openPicker('week')">
                    <div class="reel" id="reviewWeekReel"></div>
                </div>
            </div>
        </div>

        <div id="reviewPrompt" class="prompt-card-style"></div> <div id="reviewAnswerContainer">
            <div class="answer-header-static">ANSWER</div>
            <div id="reviewAnswerContent"></div>
        </div>
    </div>
</div>

<div id="resetConfirmOverlay">
  <div class="confirmBox">
    <h3 style="margin-top:0">Clear Progress?</h3>
    <p>This will reset all lessons in the grid.</p>
    <div style="display:flex; gap:12px; justify-content:center;">
      <button onclick="resetGridConfirmed()" style="background:var(--primary); color:white; border:none; padding:12px 20px; border-radius:12px; font-weight:700; cursor:pointer;">Yes, Reset</button>
      <button onclick="hideResetConfirm()" style="background:#f1f5f9; color:#64748b; padding:12px 20px; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

<div id="doneOverlay">
  <canvas id="confettiCanvas"></canvas>
  <div class="doneBox">
    <div class="doneActions">
      <h3 style="margin-top:0; color:var(--secondary)">Lesson Complete!</h3>
      <p>Great work — you finished all lessons for today.</p>
      <div style="display:flex; gap:12px; justify-content:center; margin-top:12px;">
        <button onclick="(function(){ resetGridConfirmed(); hideDoneOverlay(); })()" style="background:#22c55e; color:white; border:none; padding:12px 18px; border-radius:12px; font-weight:700; cursor:pointer;">Reset Lesson</button>
      </div>
    </div>
  </div>
</div>

<div id="gridOverlay">
    <div id="gridContent">
        <div class="gridHeader">
          <button class="circleBtn" onclick="toggleGrid()">&larr;</button>
          
          <button class="resetHeaderBtn" onclick="resetGrid()">Reset</button>
          
          <button class="circleBtn" onclick="toggleSettings()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="3"></circle>
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
            </svg>
          </button>
        </div>
  

        <div class="grid-controls-row">
            <div class="maxWeekControl">
                <span>Max Week:</span>
                <button id="decreaseWeek" class="maxWeekBtn" onclick="decreaseWeek()">-</button>
                <span id="maxWeekDisplay">12</span>
                <button id="increaseWeek" class="maxWeekBtn" onclick="increaseWeek()">+</button>
            </div>
            <select id="cyclePicker" onchange="changeCycle(this.value)">
                <option value="1">Cycle 1</option>
                <option value="2">Cycle 2</option>
                <option value="3">Cycle 3</option>
            </select>
        </div>

        <div id="grid"></div>

        </div>
    </div>
  
  <div id="settingsOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); z-index: 5000; justify-content: center; align-items: center;">
    <div style="background: white; width: 90%; max-width: 350px; border-radius: 16px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
        <h3 style="margin-top: 0; text-align: center; color: var(--primary);">Settings</h3>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
          <label style="font-weight: bold;">Mute Sound</label>
          <input type="checkbox" id="setMute" onchange="updateSettings()" style="width: 20px; height: 20px;">
        </div>

        <div id="hapticsContainer" style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
          <label style="font-weight: bold;">Vibration (Haptics)</label>
          <input type="checkbox" id="setHaptics" onchange="updateSettings()" style="width: 20px; height: 20px;">
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center;">
            <label style="font-weight: bold;">Confetti Animation</label>
            <input type="checkbox" id="setConfetti" onchange="updateSettings()" style="width: 20px; height: 20px;">
        </div>

        <div style="display: flex; flex-direction: column; margin-bottom: 20px;">
            <label style="font-weight: bold; margin-bottom: 5px;">Sound Style</label>
            <select id="setWaveform" onchange="updateSettings()" style="padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px;">
                <option value="square">Retro (8-bit)</option>
                <option value="sine">Modern (Smooth)</option>
                <option value="triangle">Soft (Muted)</option>
            </select>
        </div>

        <button onclick="toggleSettings()" style="width: 100%; padding: 12px; background: var(--secondary); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer;">Done</button>
    </div>
</div>

<div id="reviewPickerOverlay" style="display: none; position: fixed; inset: 0; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); z-index: 5000;">
    <div style="background: white; width: 90%; max-width: 350px; border-radius: 16px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-height: 80vh; display: flex; flex-direction: column;">
        <h3 id="pickerTitle" style="margin-top: 0; text-align: center; color: var(--primary);">Select</h3>
        <div id="pickerGrid" style="display: grid; gap: 10px; overflow-y: auto; padding: 10px 0;"></div>
        <button onclick="closePicker()" style="margin-top: 15px; width: 100%; padding: 12px; background: #f1f5f9; color: #64748b; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;">Cancel</button>
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
