<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="theme-color" content="#f0f7ff">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CC Spinner">
  
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <title>CC Spinner</title>
<style>
/* ==========================================================================
   1. FOUNDATION & VARIABLES
   ========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700;800&display=swap');

:root {
  --primary: #ff6f61;
  --primary-dark: #d9534f;
  --secondary: #4a90e2;
  --bg: #f8fafc;
  --card-bg: rgba(255, 255, 255, 0.9);
  --text-main: #1e293b;
  --text-muted: #64748b;
  --radius: 24px;
  --shadow: 0 10px 25px rgba(0, 0, 0, 0.05);

  /* dimensions used by controls */
  --spin-size: 85px;
  --undo-size: 50px;
}

/* ==========================================================================
   2. GLOBAL LAYOUT & BODY
   ========================================================================== */
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  overflow: hidden; 
  touch-action: pan-y;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior: none;
}

input, button, select, textarea {
  font-size: 16px !important; /* iOS zooms if font-size is less than 16px */
}

body {
  font-family: 'Quicksand', sans-serif;
  background: radial-gradient(circle at top, #f0f7ff, #e2e8f0);
  background-attachment: fixed;
  color: var(--text-main);
  text-align: center;
  display: flex;
  flex-direction: column;
  box-sizing: border-box;
  padding: env(safe-area-inset-top, 20px) 15px 80px 15px; 
}

h1 {
  font-weight: 800;
  font-size: 2rem;
  color: var(--secondary);
  margin: 10px 0 5px;
  text-shadow: 1px 1px 0px #fff;
}

.version-tag {
  position: absolute; 
  top: env(safe-area-inset-top, 10px);
  right: 15px; 
  font-size: 10px; 
  color: var(--text-muted); 
  opacity: 0.5;
}

/* ==========================================================================
   3. UI COMPONENTS (Prompt & Answer Boxes)
   ========================================================================== */

/* Common Card Base Style */
#result, #prompt, #answer, .slot {
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius);
  border: 2px solid rgba(255, 255, 255, 0.4);
  box-shadow: var(--shadow);
  overflow: hidden;
  flex-shrink: 0;      
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Prompt Card */
#prompt {
  display: flex; 
  align-items: center;
  justify-content: center;
  text-align: center;
  width: 95%;          
  max-width: 600px !important; 
  min-height: 80px; 
  margin: 12px auto; 
  padding: 18px;
  box-sizing: border-box;
  font-size: 19px; 
  font-weight: 600; 
  background: rgba(255, 255, 255, 0.95);
  border: 2px solid rgba(74, 144, 226, 0.2);
  transition: border-color 0.3s ease;
}

/* Unified Answer Container */
#answerContainer {
  width: 95%;
  max-width: 600px !important;
  margin: 12px auto;
  box-sizing: border-box;
  background: var(--card-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: var(--radius);
  border: 2px solid rgba(74, 144, 226, 0.2);
  box-shadow: var(--shadow);
  overflow: hidden;
  flex-shrink: 0;
  transition: all 0.3s ease;
}

#answerContainer.open {
  border: var(--secondary);
  transform: scale(1.01);
}

#toggleAnswer {
  width: 100%;
  padding: 18px;
  background: rgba(74, 144, 226, 0.05);
  color: var(--secondary);
  border: none;
  border-bottom: 1px solid rgba(74, 144, 226, 0.1);
  font-family: inherit;
  font-size: 16px;
  font-weight: 800;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s;
}

#answerContent {
  padding: 0 20px;
  max-height: 0px;   overflow-y: auto;
  transition: all 0.3s ease;
  color: var(--text-muted);
  font-size: 17px;
  white-space: pre-wrap;
  text-align: center;
  box-sizing: border-box; 
}

#answerContainer.open #answerContent {
  max-height: 450px; 
  padding: 20px;
}

/* ==========================================================================
   4. THE SLOT MACHINE
   ========================================================================== */
.rollerBox { 
  display: flex; 
  justify-content: center; 
  gap: 15px; 
  margin: 20px 0; 
}

.slot { 
  width: 150px; 
  height: 80px; 
  border: 3px solid rgba(74, 144, 226, 0.3); 
  position: relative; 
}

.slot::after {
  content: ""; 
  position: absolute; 
  top: 0; left: 0; right: 0; height: 100%;
  background: linear-gradient(rgba(0,0,0,0.05) 0%, transparent 15%, transparent 85%, rgba(0,0,0,0.05) 100%); 
  pointer-events: none;
}

.reel div { 
  height: 80px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
  font-size: 20px; 
  font-weight: 700; 
  color: var(--text-main);
  background: linear-gradient(to bottom, #fff, #f0f7ff, #fff);
}

.reel {
  display: flex;
  flex-direction: column;
  transition: transform 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); /* Default spin speed */
}

/* ==========================================================================
   5. BUTTONS (Actions)
   ========================================================================== */

.control-row {
  position: fixed;
  /* Fixed 50px for the edit bar + the device notch */
  bottom: calc(50px + env(safe-area-inset-bottom, 0px));
  left: 0;
  right: 0;
  height: 0; /* Let children overflow so they don't block the screen */
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  pointer-events: none; 
  z-index: 600;
}

#spinBtn, #undoBtn {
  width: 90px; 
  height: 90px;
  border: none;
  cursor: pointer;
  pointer-events: auto;
  -webkit-tap-highlight-color: transparent;
  display: flex;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease;
  padding: 0; /* Remove padding as SVG handles placement */
  overflow: visible;
}

#spinBtn svg, #undoBtn svg {
  width: 100%;
  height: 100%;
}

#spinBtn text, #undoBtn text {
  fill: white;
  font-family: 'Quicksand', sans-serif;
  font-size: 18px; /* SVG font size scales differently */
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
}

#spinBtn {
  background: var(--primary);
  border-radius: 100% 0 0 0;
  transform-origin: bottom right;
}

#undoBtn {
  background: var(--secondary);
  border-radius: 0 100% 0 0;
  transform-origin: bottom left;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease, opacity 0.3s ease;
}

/* Bouncy feedback for both */
#spinBtn:active, #undoBtn:not(:disabled):active {
  transform: scale(0.85);
}

#undoBtn:disabled {
   background-color: #94b8e2;
    color: rgba(255, 255, 255, 0.6);
    cursor: not-allowed;
    transform: scale(0.98);
    opacity: 0.7;
    box-shadow: none;
}

#spinBtn:disabled {
background-color: #ff9d94; /* Faded coral/red */
    color: rgba(255, 255, 255, 0.6);
    cursor: not-allowed;
    transform: scale(0.98);
    opacity: 0.7;
    box-shadow: none;
}

  button:disabled svg text {
    fill: rgba(255, 255, 255, 0.5);
    transition: fill 0.3s ease;
}
  
/* Edit Bar Polish */
#editBtn {
  position: fixed;
  bottom: 0; 
  left: 0; 
  right: 0;
  /* Safe area handling for modern iPhones */
  height: calc(50px + env(safe-area-inset-bottom, 0px));
  padding-bottom: env(safe-area-inset-bottom, 0px);
  
  background: white;
  color: var(--secondary);
  border: none;
  border-top: 1px solid rgba(0,0,0,0.1);
  font-family: inherit;
  font-weight: 700;
  font-size: 16px;
  z-index: 500;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ==========================================================================
   6. GRID OVERLAY & EDITING
   ========================================================================== */
#gridOverlay {
  display: none; 
  position: fixed; 
  inset: 0; 
  background: rgba(0,0,0,0.35);
  z-index: 1000; 
  justify-content: flex-start; 
  align-items: stretch;
}

#gridContent {
  width: 100vw; 
  height: calc(var(--vh, 1vh) * 100);
  display: flex; 
  flex-direction: column; 
  background: #fff;
  overflow: hidden; 
  padding-top: env(safe-area-inset-top, 44px);
}

/* Row 1: Back button left, Title centered */
.gridHeader {
    display: flex;
    align-items: center;
    justify-content: center; /* Centers the H2 */
    padding: 15px;
    position: relative;
    border-bottom: 1px solid #eee;
}

.header-title {
    margin: 0;
    font-size: 1.4rem;
}

.gridHeader h2 { flex: 1; text-align: center; margin: 0; padding-right: 45px; font-size: 1.4rem; }

.closeGridBtn {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    background: #f1f3f5;
    border: none;
    width: 38px;  /* Fixed size for a perfect circle */
    height: 38px; /* Fixed size for a perfect circle */
    border-radius: 50%;
    font-size: 22px;
    font-weight: bold;
    color: var(--text);
    cursor: pointer;
    
    /* This is the magic for Android centering */
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1; 
    padding: 0;
    
    transition: background 0.2s;
}

.closeGridBtn:active {
    background: #e9ecef;
}
  
/* Table Controls & Layout */
#grid {
  padding: 12px 6px 32px 6px; 
  overflow-y: auto; 
  overflow-x: hidden;
  touch-action: pan-y; 
  width: 100%; 
  box-sizing: border-box; 
  flex: 1;
}

#grid table { table-layout: fixed; width: 100%; border-collapse: collapse; background: white; }

#grid th, #grid td {
  border: 1px solid #aaa; padding: 0; height: 40px; text-align: center;
  white-space: nowrap; font-size: 14px;
}

/* Subject Column Header (Rotated Text) */
#grid th.subjectHeader {
  height: 100px;
  background: #ffd966;
  vertical-align: middle;
}

#grid th.subjectHeader span {
  display: inline-block;
  transform: rotate(-90deg) translateX(-30px); 
  white-space: nowrap;
  line-height: 1;
  width: 20px; 
  font-weight: 700;
  font-size: 13px;
  color: #000;
  pointer-events: none;
}

/* Week Selection States */
.week-header { background: #cce7ff; width: 56px; }
.weekNumber {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%; border: none; background: #fff;
  font-weight: 700; font-size: 16px; color: #0b2540; cursor: pointer;
}
.weekNumber.active { background: #22c55e; color: #fff; }
.completed { background: #ccc !important; color: #666; }
.override { background: #d4f0d8; }
.blocked { background: #fdecea; color: #5a2a28; }

.grid-controls-row {
    display: flex;
    justify-content: space-between; /* Pushes items to the far left and right */
    align-items: center;
    padding: 15px 20px;
    background: #fdfdfd;
}

.maxWeekControl {
 display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #fff8d6;
    padding: 6px 12px;
    border-radius: 10px;
    border: 1px solid #f3d08a;
    font-weight: 600;
}

.maxWeekBtn {
  width: 34px; height: 34px; background: #ffd37a; border: 1px solid #e6a83a;
  border-radius: 8px; cursor: pointer; font-size: 18px;
}

.resetHeaderBtn {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: 1px solid #dc3545;
  color: #dc3545;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
}

.resetHeaderBtn:hover {
  background: #fff5f5;
}

.resetHeaderBtn:active {
  background: #dc3545;
  color: white;
}
  
/* ==========================================================================
   7. MODALS & DIALOGS
   ========================================================================== */
  #resetConfirmOverlay {
  position: fixed;
  inset: 0;
  display: none;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.5);
  z-index: 3000;
}

#resetConfirmOverlay .confirmBox {
  background: #fff;
  padding: 25px;
  border-radius: 15px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  width: 85%;
  max-width: 320px;
  text-align: center;
}

#cyclePicker {
    appearance: none; /* Removes default browser arrow */
    -webkit-appearance: none;
    background-color: var(--secondary);
    color: white;
    padding: 8px 16px;
    border-radius: 20px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    text-align: center;
    transition: transform 0.2s, background 0.2s;
    box-shadow: 0 4px 10px rgba(74, 144, 226, 0.3);
    font-family: inherit;
    min-width: 90px;
    margin: 0;
}

#cyclePicker:hover {
    background-color: #357abd;
    transform: translateY(-1px);
}

#cyclePicker:active {
    transform: translateY(0);
}

</style>
</head>

<div class="rollerBox">
  <div class="slot">
    <div class="reel" id="subjectReel"></div>
  </div>
  <div class="slot">
    <div class="reel" id="weekReel"></div>
  </div>
</div>

<div id="prompt"></div>

<div id="answerContainer">
  <button id="toggleAnswer" onclick="toggleAnswer()">▼ Show Answer ▼</button>
  <div id="answerContent"></div>
</div>

<button id="editBtn" onclick="toggleGrid()">Edit Lesson Grid</button>

<div class="version-tag">v<span id="app-version">1.0.4</span></div>

<div class="control-row">
  <button id="undoBtn" onclick="undoLastSpin()" disabled>
    <svg viewBox="0 0 100 100">
      <!-- Even tighter arc, closer to the corner -->
      <path id="undoCurve" d="M 30,30 A 50,50 0 0 1 70,70" fill="transparent" />
      <text>
        <textPath xlink:href="#undoCurve" startOffset="50%" text-anchor="middle">undo</textPath>
      </text>
    </svg>
  </button>

  <button id="spinBtn" onclick="spinBoth()">
    <svg viewBox="0 0 100 100">
      <!-- Even tighter arc, closer to the corner -->
      <path id="spinCurve" d="M 30,70 A 50,50 0 0 1 70,30" fill="transparent" />
      <text>
        <textPath xlink:href="#spinCurve" startOffset="50%" text-anchor="middle">SPIN</textPath>
      </text>
    </svg>
  </button>
</div>

<div id="resetConfirmOverlay">
  <div class="confirmBox">
    <h3 style="margin-top:0">Clear Progress?</h3>
    <p>This will reset all lessons in the grid.</p>
    <div style="display:flex; gap:12px; justify-content:center;">
      <button onclick="resetGridConfirmed()" style="background:var(--primary); color:white; border:none; padding:12px 20px; border-radius:12px; font-weight:700; cursor:pointer;">Yes, Reset</button>
      <button onclick="hideResetConfirm()" style="background:#f1f5f9; color:#64748b; padding:12px 20px; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

<div id="gridOverlay">
    <div id="gridContent">

            <button class="resetHeaderBtn" onclick="resetGrid()">Reset</button>
        </div>

        <div class="grid-controls-row">
            <div class="maxWeekControl">
                <span>Max Week:</span>

                <span id="maxWeekDisplay">12</span>
                <button id="increaseWeek" class="maxWeekBtn" onclick="increaseWeek()">+</button>
            </div>
            <select id="cyclePicker" onchange="changeCycle(this.value)">
                <option value="1">Cycle 1</option>
                <option value="2">Cycle 2</option>
                <option value="3">Cycle 3</option>
            </select>
        </div>

        <div id="grid"></div>

        </div>
    </div>
</div>

    "History": {
      1: { p: "Tell me about Charlemagne.", a: "In 800, during the medieval period, Pope Leo III crowned Charlemagne Holy Roman Emperor of Europe." },
      2: { p: "Tell me about William the Conqueror.", a: "In 1054,the church split into Roman Catholic and Eastern Orthodox. William the Conqueror defeated King Harold of England in 1066 and started feudalism." },
      3: { p: "Tell me about the Crusades.", a: "Richard the Lion-Hearted, son of Eleanor of Aquitaine, fought the Turks for Jerusalem during the time of the Crusades, from 1095 to 1291." },
      4: { p: "Tell me about the Magna Carta.", a: "English King John signed the Magna Carta in 1215, limiting the king's power. Later, England's King Edward III claimed to be king of France and began the Hundred Years' War in 1337." },
      5: { p: "Tell me about the Hundred Years' War.", a: "During the Hundred Years' War, Joan of Arc and King Charles VII led the French to defeat the English at the Siege of Orleans. In the late 1340s fleas on rats carried the plague, which killed one of out three Europeans" },
      6: { p: "Tell me about the Renaissance.", a: "During the Renaissance period, from 1350 to 1600, Leonardo da Vinci was a famous inventor, Shakespeare was a famous playwright, Michelangelo was a famous artist, and Copernicus was a famous scientist." },
      7: { p: "Tell me about the Reformation.", a: "In 1517, Martin Luther began the Protestant Reformation by printing the Ninety-Five Theses that made Pope Leo X excommunicate him. Later John Clavin joined the Reformation." },
      8: { p: "Tell me about European explorers.", a: "Between the late 1400s and the mid-1500s, Dias rounded the Cape of Good Hope, Amerigo Vespucci sailed the the Americas, Balboa crossed Central America to the Pacific, Magellan's crew sailed around the globe, and Coronado explored the American Southwest." },
      9: { p: "Tell me about some absolute monarchs.", a: "Between the 1500s and 1800s, Henry VIII of England, Louis XIV of France, Philip II of Spain, Peter the Great of Russia, and Frederick the Great of Prussia ruled during the age of absolute monarchs." },
      10: { p: "Tell me about the history of Russia.", a: "Vladimir I brought Christianity to Russia in the 900s. In the 1500s, Czar Ivan the Terrible unified Russia, Peter the Great and Catherine the Great expanded and Westernized Russia in the 1700s." },
      11: { p: "Tell me about the French Revolution.", a: "In 1789, the French Revolution began when citizens stormed the Bastille and fought for the Declaration of the Rights of Man. Later, during the Reign of Terror, the aristocrats' heads were removed by the guillotine." },
      12: { p: "Tell me about the Battle of Waterloo.", a: "Napoleon Bonaparte of the French Empire was defeated at the Battle of Waterloo by British General Wellington and his allies soon after the War of 1812 in the United States." },
      13: { p: "Tell me about the Industrial Revolution.", a: "Watt's steam engine, Cartwright's power loom, and Whitney's cotton gin spurred the Industrial Revolution that began in the 1760s." },
      14: { p: "Tell me about World War I leaders.", a: "Clemenceau of France, Lloyd George of England, Nicholas II of Russia, Wilhelm II of Germany, and Wilson of the United States were leaders during World War I, which started in 1914 and ended in 1918." },
      15: { p: "Tell me about World War I countries.", a: "During World War I, Great Britain, France and Russia were Allies and fought against Austria-Hungary and Germany, which were called the Central Powers. In 1917, the United States entered the war, assisting the Allies" },
      16: { p: "Tell me about how World War II began.", a: "World War II began in 1939 when Hitler invaded Poland. Two engagements that helped the United States win the Pacific front were defeating Japan at the Battle of Midway dropping atomic bombs on Hiroshima and Nagasaki in 1945." },
      17: { p: "Tell me about World War II leaders.", a: "World War II Axis leaders were: Hitler of Germany, Tojo of Japan, and Mussolini of Italy. World War II Allied leaders were: Churchill of England, Roosevelt, Eisenhower and MacArthur of the United States and Stalin of the USSR." },
      18: { p: "Tell me about the United Nations.", a: "In 1945, after the League of Nations failed to prevent World War II, American President Roosevelt, British Prime Minister Churchill, and Soviet Premier Stalin began the United Nations." },
      19: { p: "Tell me about the Korean War.", a: "In 1950, General Douglas MacArthur led United Nations forces to stop communist North Korea from capturing all of South Korea during the Korean War." },
      20: { p: "Tell me about the Vietnam War.", a: "In 1965, President Johnson sent U.S. troops to stop communist North Vietnam from capturing all of South Vietnam during the Vietnam War." },
      21: { p: "Tell me about the end of the Cold War.", a: "In the 1980s, British Prime Minister Margaret Thatcher and American President Ronald Reagan worked together to end the Cold War, lessen big government, and strengthen the conservative movement." },
      22: { p: "Tell me about the fall of communism.", a: "In 1989, the communist dictators began to fall in Eastern Europe when Soviet General Secretary Gorbachev refused to send military aid." },
      23: { p: "Tell me about the Gulf War.", a: "In 1990, President George H. W. Bush sent troops to the Persian Gulf to expel Iraqi leader Saddam Hussein from Kuwait during the Gulf War." },
      24: { p: "Tell me about the end of apartheid.", a: "In 1994, South African President de Klerk allowed free elections. Nelson Mandela became South Africa's first black president, demonstrating apartheid was ending." }
    },

    "History": {
      1: { p: "Tell me about Columbus.", a: "In 1492, Columbus made the first of four trips to the Caribbean on three Spanish ships named the Niña, the Pinta, and the Santa María." },
      2: { p: "Tell me about the Pilgrims.", a: "In 1620, the Pilgrims sailed from Plymouth, England and signed the Mayflower Compact before founding Plymouth Colony in North America." },
      3: { p: "Tell me about the Boston Tea Party.", a: "In 1773, colonists disguised as Mohawks dumped tea from the British East India Company into the Boston Harbor." },
      4: { p: "Tell me about the Declaration of Independence.", a: "In 1776, the Continental Congress published the Declaration of Independence in Philadelphia, announcing the colonists' intent to separate from England." },
      5: { p: "Tell me about George Washington.", a: "In 1789, in New York, George Washington was granted the full powers and responsibilities of the presidency by the U.S. Constitution." },
      6: { p: "Tell me about the Louisiana Purchase.", a: "In 1803, the purchase of Louisiana from France prompted westward exploration by pioneers such as Lewis and Clark and Congressman Davy Crockett." },
      7: { p: "Tell me about the Monroe Doctrine.", a: "After victory in the War of 1812, the United States wrote the Monroe Doctrine, which warned Europeans not to attempt to colonize the Americas." },
      8: { p: "Tell me about the Missouri Compromise.", a: "In 1820, Henry Clay worked out the Missouri Compromise, allowing Missouri to enter the Union as a slave state and Maine as a free state." },
      9: { p: "Tell me about Manifest Destiny.", a: "President Polk believed that the Mexican War and the Gadsden Purchase in the mid-1800s affirmed America's manifest destiny to spread across the continent." },
      10: { p: "Tell me about the secession of the Southern states.", a: "The Compromise of 1850, the Fugitive Slave Act, and the Dred Scott decision preceded the secession of the Southern states." },
      11: { p: "Tell me about the Civil War.", a: "In 1861, the Civil War began when President Abraham Lincoln went to war with the Southern states that had seceded from the Union." },
      12: { p: "Tell me about General Robert E. Lee.", a: "In 1865, General Robert E. Lee surrendered to General Ulysses S. Grant at Appomattox Court House in Virginia." },
      13: { p: "Tell me about the Fourteenth Amendment.", a: "In 1868, the Fourteenth Amendment made all former slaves U.S. citizens and paved the way for the Civil Rights Movement." },
      14: { p: "Tell me about tycoons.", a: "During the late 1800s, tycoons like Vanderbilt, Rockefeller, Carnegie, and Swift fueled the nation's Industrial Age by developing American resources." },
      15: { p: "Tell me about immigrants coming to America.", a: "From 1820 to 1930, more than 37 million immigrants came to America, seeking freedom and the opportunity to increase their personal wealth." },
      16: { p: "Tell me about the U.S. and World War I.", a: "In 1917, President Wilson asked Congress to enter World War I against the Central Powers two years after German U-boats sank the Lusitania." },
      17: { p: "Tell me about the Nineteenth Amendment.", a: "Elizabeth Cady Stanton and Susan B. Anthony led the women's suffrage movement, resulting in the Nineteenth Amendment in 1920 that granted women the right to vote." },
      18: { p: "Tell me about Pearl Harbor.", a: "On December 7, 1941, the Japanese bombed Pearl Harbor, Hawaii, causing the United States to join the Allies in World War II." },
      19: { p: "Tell me about NATO.", a: "In 1949, the United States and its allies formed NATO to resist the spread of Soviet communism." },
      20: { p: "Tell me about Brown v. Board of Education.", a: "In 1954, the U.S. Supreme Court ruled that the segregation of public schools by race is unconstitutional." },
      21: { p: "Tell me about U.S. astronauts.", a: "In 1969, U.S. astronauts Neil Armstrong and Edwin Aldrin were the first men to walk on the moon." },
      22: { p: "Tell me about September 11, 2001.", a: "Terrorists hijacked four airplanes, flying them into the World Trade Center, the Pentagon, and a Pennsylvania field." },
      23: { p: "Tell me the Preamble to the U.S. Constitution.", a: "We the People of the United States, in order to form a more perfect Union, establish Justice, insure domestic Tranquility..." },
      24: { p: "Tell me the Bill of Rights.", a: "1. Freedoms, 2. Own guns, 3. Quartering soldiers, 4. Warrants, 5. Cannot testify against self, 6. Right to speedy trial, 7. Right to a jury, 8. Cruel/unusual punishment, 9. People's rights, 10. States' rights" }

      23: { p: "Age of Information and Globalization to Rising Tide of Freedom", a: "AGE OF INFORMATION AND GLOBALIZATION (c. 1970-present), Watergate and President Nixon Resigns, Fall of Communism in Eastern Europe, European Union Formed, Apartheid Abolished in South Africa, (2000 AD) September 11, 2001, Rising Tide of Freedom" },
      24: { p: "Canadian Prime Ministers", a: "Macdonald, Mackenzie, Macdonald, Abbott, Thompson, Bowell, Tupper, Laurier, Borden, Meighen, King, Meighen, King, Bennett, King, St. Laurent, Diefenbaker, Pearson, Trudeau, Clark, Trudeau, Turner, Mulroney, Campbell, Chrétien, Martin, Harper, Trudeau, Carney" }
    }
  }
};

/* ==========================================================================
   2. INITIALIZATION & DATA LOADING
   ========================================================================== */

/* --- Persistence for the active cycle --- */
// MUST be defined before we try to load cycle-specific data
let currentCycle = localStorage.getItem('ccActiveCycle') ? parseInt(localStorage.getItem('ccActiveCycle')) : 2;

// Cycle-specific prefix for storage
const getPrefix = () => `cycle${currentCycle}_`;

/* --- Persistence Helpers --- */
// We load the data based on the prefix of the current cycle
let gridState = localStorage.getItem(getPrefix() + 'ccSpinnerProgress') ? 
                JSON.parse(localStorage.getItem(getPrefix() + 'ccSpinnerProgress')) : {};

let allowedWeeks = localStorage.getItem(getPrefix() + 'ccAllowedWeeks') ? 
                   JSON.parse(localStorage.getItem(getPrefix() + 'ccAllowedWeeks')) : [];

let blockedWeeks = localStorage.getItem(getPrefix() + 'ccBlockedWeeks') ? 
                   JSON.parse(localStorage.getItem(getPrefix() + 'ccBlockedWeeks')) : [];

let savedMaxWeek = localStorage.getItem(getPrefix() + 'ccMaxWeek');

// Initialize lessonData pointer
let lessonData = cycleData[currentCycle];

// Initialize gridState if empty for this cycle
if (Object.keys(gridState).length === 0) {
  subjects.forEach(s => {
    gridState[s] = {};
    weeks.forEach(w => gridState[s][w] = true);
  });
}

function changeCycle(cycleNum) {
    currentCycle = parseInt(cycleNum);
    localStorage.setItem('ccActiveCycle', currentCycle);
    
    // Update data pointer
    lessonData = cycleData[currentCycle];
    
    // Reload cycle-specific progress
    gridState = localStorage.getItem(getPrefix() + 'ccSpinnerProgress') ? 
                JSON.parse(localStorage.getItem(getPrefix() + 'ccSpinnerProgress')) : {};
    
    allowedWeeks = localStorage.getItem(getPrefix() + 'ccAllowedWeeks') ? 
                   JSON.parse(localStorage.getItem(getPrefix() + 'ccAllowedWeeks')) : [];
                   
    blockedWeeks = localStorage.getItem(getPrefix() + 'ccBlockedWeeks') ? 
                   JSON.parse(localStorage.getItem(getPrefix() + 'ccBlockedWeeks')) : [];
    
    // If it's a fresh cycle, initialize it
    if (Object.keys(gridState).length === 0) {
        subjects.forEach(s => {
            gridState[s] = {};
            weeks.forEach(w => gridState[s][w] = true);
        });
    }

    // Update UI
    const cycleMax = localStorage.getItem(getPrefix() + 'ccMaxWeek');
    setMaxWeek(cycleMax ? parseInt(cycleMax) : 24);
    buildGrid();
}

// --- Window Load & App Config ---
window.onload = function() {
  document.getElementById('cyclePicker').value = currentCycle;
  lessonData = cycleData[currentCycle];

  const prefix = getPrefix();
  const savedMax = localStorage.getItem(prefix + 'ccMaxWeek');
  if (savedMax) setMaxWeek(parseInt(savedMax, 10));
  else setMaxWeek(24);

  document.getElementById('toggleAnswer').disabled = true;
  buildGrid();
  
  // Initial Vibration Feedback
  if (navigator.vibrate) navigator.vibrate(40);

  // Sync Version Tag
  fetch('manifest.json') 
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(m => { if(document.getElementById('app-version')) document.getElementById('app-version').innerText = m.version; })
    .catch(() => { if(document.getElementById('app-version')) document.getElementById('app-version').innerText = "not available"; });
};

function saveToDevice() {
  const prefix = getPrefix();
  localStorage.setItem(prefix + 'ccSpinnerProgress', JSON.stringify(gridState));
  localStorage.setItem(prefix + 'ccMaxWeek', String(getMaxWeek()));
  localStorage.setItem(prefix + 'ccAllowedWeeks', JSON.stringify(allowedWeeks));
  localStorage.setItem(prefix + 'ccBlockedWeeks', JSON.stringify(blockedWeeks));
}

function updateVh() { 
  document.documentElement.style.setProperty('--vh', (window.innerHeight * 0.01) + 'px'); 
}
window.addEventListener('resize', updateVh);
updateVh();

/* ==========================================================================
   3. CORE APP LOGIC (Spinning & Toggling)
   ========================================================================== */

function spinBoth() {
  const spinBtn = document.getElementById("spinBtn");

  // Handle Reset State
  if (spinBtn.textContent === "Reset") {
     showResetConfirm(); 
     return; 
  }
  
  const toggleBtn = document.getElementById("toggleAnswer");
  const undoBtn = document.getElementById("undoBtn");
  const ansDiv = document.getElementById("answerContent");
  const promptDiv = document.getElementById("prompt");

  if (isSpinning) return;
  if (navigator.vibrate) navigator.vibrate(15); 

  const maxWeekLimit = getMaxWeek();
  const availableSubjects = subjects.filter(s =>
    weeks.some(w => (w <= maxWeekLimit || allowedWeeks.includes(w)) && !blockedWeeks.includes(w) && gridState[s][w])
  );

  if (availableSubjects.length === 0) {
    spinBtn.textContent = "Reset";
    spinBtn.style.background = "#64748b"; 
    spinBtn.style.fontSize = "14px";
    return;
  }

  // Lock State
  isSpinning = true;
  spinBtn.disabled = true;
  toggleBtn.disabled = true;
  undoBtn.disabled = true;
  
  toggleBtn.textContent = '▼ Show Answer ▼';
  document.getElementById('answerContainer').classList.remove('open');
  ansDiv.textContent = "";
  promptDiv.textContent = "";

  // 1. Pick the winning subject and week
  const subject = availableSubjects[Math.floor(Math.random() * availableSubjects.length)];
  const availableWeeks = weeks.filter(w => ((w <= maxWeekLimit || allowedWeeks.includes(w)) && !blockedWeeks.includes(w)) && gridState[subject][w]);
  const week = availableWeeks[Math.floor(Math.random() * availableWeeks.length)];

  // 2. DEFINE THE INDICES (The missing part that was causing the crash)
  const subIdx = subjects.indexOf(subject);
  const weekIdx = weeks.indexOf(week);

  // 3. Start Reel Animations
  spinReel("subjectReel", availableSubjects, subject, 2000);
  spinReel("weekReel", availableWeeks.map(w => "Week " + w), "Week " + week, 2800);

  // 4. Finalize Spin
  setTimeout(() => {
    try {
      playSound(880, 'sine', 0.5, 0.04); 
      if (navigator.vibrate) navigator.vibrate([40, 30, 40]);
      
      const lesson = lessonData[subject][week];

      // Save memory for Undo
      previousSpun = lastSpun ? { ...lastSpun } : null; 

      lastSpun = {
        subject: subject,
        week: week,
        sIdx: subIdx,   // Now properly defined
        wIdx: weekIdx,   // Now properly defined
        prompt: lesson.p,
        answer: lesson.a
      };

      // Display results
      document.getElementById('prompt').textContent = lesson.p;
      document.getElementById('answerContent').innerHTML = lesson.a;
      
      // Update Grid State
      gridState[subject][week] = false;
      
      saveToDevice();
      buildGrid();
      
    } catch (e) {
      console.error("Spin Error:", e);
      document.getElementById('prompt').textContent = "Spinning error. Please try again!";
    } finally {
      // Re-enable everything
      isSpinning = false;
      spinBtn.disabled = false;
      toggleBtn.disabled = false;
      undoBtn.disabled = false; 
    }
  }, 2600);
}

function spinReel(reelId, items, finalValue, duration = 2400) {
  const reel = document.getElementById(reelId);
  reel.innerHTML = "";
  const sequence = [];
  for (let i = 0; i < 20; i++) sequence.push(items[Math.floor(Math.random() * items.length)]);
  sequence.push(finalValue);
  
  sequence.forEach(text => {
    const div = document.createElement("div");
    div.textContent = subjectIcons[text] ? `${subjectIcons[text]} ${text}` : text;
    reel.appendChild(div);
  });

  const totalMove = (sequence.length - 1) * 80;
  let currentTick = 0;
  
  function playNextTick() {
    if (!isSpinning || currentTick >= sequence.length) return;
    playSound(1000, 'sine', 0.02, 0.01); 
    currentTick++;
    const nextDelay = (duration / sequence.length) * (1 + Math.pow(currentTick / sequence.length, 2) * 10);
    if (currentTick < sequence.length) setTimeout(playNextTick, nextDelay);
  }
  playNextTick();

  reel.style.transition = "none";
  reel.style.transform = "translateY(0)";
  setTimeout(() => {
    reel.style.transition = `transform ${duration}ms cubic-bezier(0.15, 0, 0.15, 1)`;
    reel.style.transform = `translateY(-${totalMove}px)`;
  }, 20);
}

function toggleAnswer() {
  if (navigator.vibrate) navigator.vibrate(10);
  const container = document.getElementById('answerContainer');
  const btn = document.getElementById('toggleAnswer');
  container.classList.toggle('open');
  btn.textContent = container.classList.contains('open') ? '▲ Hide Answer ▲' : '▼ Show Answer ▼';
}

function undoLastSpin() {
    if (!lastSpun) return;

    // 1. Put the "mistake" back on the grid
    gridState[lastSpun.subject][lastSpun.week] = true;

    // 2. Rewind the UI
    if (previousSpun) {
        // We must REBUILD the reels with the standard lists so the index matches the physical divs
        const subReel = document.getElementById('subjectReel');
        const weekReel = document.getElementById('weekReel');

        // Re-populate Subject Reel with standard list
        subReel.innerHTML = "";
        subjects.forEach(s => {
            const div = document.createElement("div");
            div.textContent = `${subjectIcons[s]} ${s}`;
            subReel.appendChild(div);
        });

        // Re-populate Week Reel with standard list
        weekReel.innerHTML = "";
        weeks.forEach(w => {
            const div = document.createElement("div");
            div.textContent = "Week " + w;
            weekReel.appendChild(div);
        });

        // Force a tiny reflow so the browser sees the new divs before animating
        subReel.offsetHeight; 

        // Apply the "Rewind" animation
        subReel.style.transition = "transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
        weekReel.style.transition = "transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)";

        // Move to the PREVIOUS indices
        subReel.style.transform = `translateY(-${previousSpun.sIdx * 80}px)`;
        weekReel.style.transform = `translateY(-${previousSpun.wIdx * 80}px)`;

        // Update Text to previous question
        document.getElementById('prompt').textContent = previousSpun.prompt;
        document.getElementById('answerContent').innerHTML = previousSpun.answer;
        
        // Step back the memory
        lastSpun = { ...previousSpun };
        previousSpun = null; 
    } else {
        // If there was no previous question, just reset to top
        document.getElementById('subjectReel').style.transform = `translateY(0)`;
        document.getElementById('weekReel').style.transform = `translateY(0)`;
        document.getElementById('prompt').textContent = "Spin to start!";
        document.getElementById('answerContent').textContent = "";
        lastSpun = null;
    }

    // 3. Reset UI state
    document.getElementById('answerContainer').classList.remove('open');
    document.getElementById('undoBtn').disabled = true;
    
    if (navigator.vibrate) navigator.vibrate(40);
    saveToDevice();
    buildGrid();
}

/* ==========================================================================
   4. AUDIO & HAPTICS HELPERS
   ========================================================================== */

function playSound(frequency, type, duration, volume = 0.1) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const oscillator = audioCtx.createOscillator();
  const gainNode = audioCtx.createGain();
  oscillator.type = type; 
  oscillator.frequency.setValueAtTime(frequency, audioCtx.currentTime);
  gainNode.gain.setValueAtTime(0.001, audioCtx.currentTime);
  gainNode.gain.exponentialRampToValueAtTime(volume, audioCtx.currentTime + 0.01);
  gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  oscillator.connect(gainNode);
  gainNode.connect(audioCtx.destination);
  oscillator.start();
  oscillator.stop(audioCtx.currentTime + duration);
}

/* ==========================================================================
   5. GRID & LESSON MANAGEMENT
   ========================================================================== */

function buildGrid(){
  saveToDevice();
  const maxWeek = getMaxWeek();
  const container = document.getElementById('gridContent');
  const containerWidth = container ? container.clientWidth : window.innerWidth;
  const availableForSubjects = Math.max(120, containerWidth - 48 - 12);
  const subjectWidth = Math.max(32, Math.floor(availableForSubjects / subjects.length));

  let html = `<table><colgroup><col style="width:48px">`;
  subjects.forEach(() => { html += `<col style="width:${subjectWidth}px">`; });
  html += '</colgroup><tr><th></th>';
  subjects.forEach(s => { html += `<th class="subjectHeader" onclick="toggleSubject('${s}')"><span>${s}</span></th>`; });
  html += '</tr>';

  weeks.forEach(w => {
    const isAllowed = allowedWeeks.includes(w);
    const isBlocked = blockedWeeks.includes(w);
    const numClass = isBlocked ? 'blocked' : (isAllowed ? 'active' : '');
    html += `<tr><th class="week-header" data-week="${w}"><button class="weekNumber ${numClass}" data-week="${w}">${w}</button></th>`;
    subjects.forEach(s => {
      let cls = "";
      if (!gridState[s][w] || isBlocked || (w > maxWeek && !isAllowed)) cls = "completed";
      else if (isAllowed && w > maxWeek) cls = "override";
      html += `<td class="${cls}" onclick="toggleCell('${s}',${w})"></td>`;
    });
    html += '</tr>';
  });
  document.getElementById('grid').innerHTML = html + '</table>';
  bindWeekHeaderHandlers();
}

// --- Grid Interaction Helpers ---
function toggleCell(s,w){ gridState[s][w] = !gridState[s][w]; buildGrid(); }
function toggleSubject(s){ const anyOn = weeks.some(w => gridState[s][w]); weeks.forEach(w => gridState[s][w] = !anyOn); buildGrid(); }
function toggleWeek(w){ const anyOn = subjects.some(s => gridState[s][w]); subjects.forEach(s => gridState[s][w] = !anyOn); buildGrid(); }

function toggleAllowWeek(e, w) {
  const maxWeek = getMaxWeek();
  const blockedIdx = blockedWeeks.indexOf(w);
  if (blockedIdx !== -1) blockedWeeks.splice(blockedIdx, 1);
  else {
    const allowedIdx = allowedWeeks.indexOf(w);
    if (allowedIdx !== -1) allowedWeeks.splice(allowedIdx, 1);
    else (w > maxWeek) ? allowedWeeks.push(w) : blockedWeeks.push(w);
  }
  saveToDevice(); buildGrid();
}

function bindWeekHeaderHandlers(){
  document.querySelectorAll('#grid th.week-header').forEach(th => th.addEventListener('click', ()=> toggleWeek(Number(th.getAttribute('data-week')))));
  document.querySelectorAll('#grid .weekNumber').forEach(btn => btn.addEventListener('click', function(e){ e.stopPropagation(); toggleAllowWeek(e, Number(this.getAttribute('data-week'))); }));
}

function toggleGrid(){
  const overlay = document.getElementById("gridOverlay");
  overlay.style.display = (overlay.style.display === "flex") ? "none" : "flex";
  if (overlay.style.display === "flex") buildGrid();
}

/* ==========================================================================
   6. WEEK SELECTION & RESET DIALOGS
   ========================================================================== */

function getMaxWeek() {
  const el = document.getElementById("maxWeekDisplay");
  return Math.max(1, Math.min(24, parseInt(el.textContent, 10) || 24));
}
function setMaxWeek(n) {
  document.getElementById("maxWeekDisplay").textContent = String(Math.max(1, Math.min(24, Number(n) || 1)));
}
function increaseWeek() { setMaxWeek(getMaxWeek() + 1); buildGrid(); }
function decreaseWeek() { setMaxWeek(getMaxWeek() - 1); buildGrid(); }

function showResetConfirm() { document.getElementById('resetConfirmOverlay').style.display = 'flex'; }
function hideResetConfirm() { document.getElementById('resetConfirmOverlay').style.display = 'none'; }

function resetGrid() { showResetConfirm(); }

function resetGridConfirmed() {
  isSpinning = false;
  hideResetConfirm();
  subjects.forEach(s => {
    gridState[s] = {};
    weeks.forEach(w => gridState[s][w] = true);
  });
  allowedWeeks = [];
  blockedWeeks = [];
  saveToDevice();
  buildGrid();
  
  const spinBtn = document.getElementById("spinBtn");
  spinBtn.style.background = "var(--primary)"; 
  spinBtn.disabled = false;
  
  document.getElementById('prompt').textContent = "Grid Reset!";
  document.getElementById('answerContent').textContent = ""; 
  document.getElementById('answerContainer').classList.remove('open');
  document.getElementById('toggleAnswer').disabled = true;
}

document.addEventListener('touchstart', function (event) {
  if (event.touches.length > 1) {
    event.preventDefault();
  }
}, { passive: false });

let lastTouchEnd = 0;
document.addEventListener('touchend', function (event) {
  const now = (new Date()).getTime();
  if (now - lastTouchEnd <= 300) {
    event.preventDefault();
  }
  lastTouchEnd = now;
}, false);

/* ==========================================================================
   7. INPUT & SERVICE WORKER BINDINGS
   ========================================================================== */

function bindHoldButton(id, actionFn){
  const el = document.getElementById(id);
  let holdTimeout, holdInterval;
  const start = (e) => { e.preventDefault(); actionFn(); holdTimeout = setTimeout(()=> holdInterval = setInterval(actionFn, 110), 350); };
  const stop = () => { clearTimeout(holdTimeout); clearInterval(holdInterval); };
  el.addEventListener('mousedown', start); el.addEventListener('mouseup', stop); el.addEventListener('mouseleave', stop);
  el.addEventListener('touchstart', start, {passive:false}); el.addEventListener('touchend', stop);
}
bindHoldButton('increaseWeek', increaseWeek);
bindHoldButton('decreaseWeek', decreaseWeek);

// --- PWA Service Worker ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js').then(reg => {
      reg.update(); 
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            if (confirm("New version available! Update now?")) window.location.reload();
          }
        });
      });
    });
  });
}
