<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="theme-color" content="#ff6f61">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CC Spinner">
  
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">

  <title>CC Spinner</title>
  <link rel="stylesheet" href="styles.css">

  <script data-goatcounter="https://cc-spinner.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
        
</head>
<body>

<div id="spinnerContainer" class="view-container active">
  <div class="rollerBox">
    <div class="slot">
      <div class="reel" id="subjectReel"></div>
    </div>
    <div class="slot">
      <div class="reel" id="weekReel"></div>
    </div>
  </div>

  <div id="prompt"></div>

  <div id="answerContainer">
    <button id="toggleAnswer" onclick="toggleAnswer()">▼ Show Answer ▼</button>
    <div id="answerContent"></div>
  </div>

<div class="control-row">
    <button id="undoBtn" onclick="undoLastSpin()" disabled>
      <svg viewBox="0 0 100 100">
        <path id="undoCurve" d="M 30,30 A 50,50 0 0 1 70,70" fill="transparent" />
        <text><textPath xlink:href="#undoCurve" startOffset="50%" text-anchor="middle">undo</textPath></text>
      </svg>
    </button>

    <button id="flagBtn" onclick="toggleMistake()" disabled>
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
          <line x1="4" y1="22" x2="4" y2="15"></line>
       </svg>
    </button>

    <button id="spinBtn" onclick="spinBoth()">
      <svg viewBox="0 0 100 100">
        <path id="spinCurve" d="M 30,70 A 50,50 0 0 1 70,30" fill="transparent" />
        <text><textPath xlink:href="#spinCurve" startOffset="50%" text-anchor="middle">SPIN</textPath></text>
      </svg>
    </button>
  </div>
</div>

<div id="reviewContainer" class="view-container">
    <div class="review-layout">
        <div class="review-controls">
            <div class="ctrl-group">
                <div class="slot review-slot" id="scrollSubject" onclick="openPicker('subject')">
                    <div class="reel" id="reviewSubjectReel"></div>
                </div>
            </div>

            <div class="ctrl-group">
                <div class="slot review-slot" id="scrollWeek" onclick="openPicker('week')">
                    <div class="reel" id="reviewWeekReel"></div>
                </div>
            </div>
        </div>

        <div id="reviewPrompt" class="prompt-card-style"></div> 
        
        <div id="reviewAnswerContainer">
            <div class="answer-header-static">ANSWER</div>
            <div id="reviewAnswerContent"></div>
        </div>
    </div>
</div>

<div id="gridContainer" class="view-container">
    <div id="gridContent" style="padding-top: 20px; width: 100%; flex: 1; display: flex; flex-direction: column; overflow: hidden;">
        
        <div style="display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 10px; flex-shrink: 0;">
            <button class="resetHeaderBtn" onclick="resetGrid()" style="padding: 10px 24px; font-size: 14px;">Reset Grid</button>
            
            <div style="display: flex; gap: 15px; align-items: center; justify-content: center; flex-wrap: wrap;">
                <select id="cyclePicker" onchange="changeCycle(this.value)">
                    <option value="1">Cycle 1</option>
                    <option value="2">Cycle 2</option>
                    <option value="3">Cycle 3</option>
                </select>
                
                <div class="maxWeekControl">
                    <span>Max Week:</span>
                    <button id="decreaseWeek" class="maxWeekBtn" onclick="decreaseWeek()">-</button>
                    <span id="maxWeekDisplay">12</span>
                    <button id="increaseWeek" class="maxWeekBtn" onclick="increaseWeek()">+</button>
                </div>
            </div>
        </div>

        <div id="grid"></div>
    </div>
</div>

<div id="challengeContainer" class="view-container">
    <h1 class="app-title" style="margin-top: 40px; margin-bottom: 20px;">Challenges</h1>
    
    <div class="settings-menu">
        <button class="setting-item" onclick="startMistakeReview()">
            <div class="setting-text">
                <h4>Review Mistakes</h4>
                <p>Target the lessons that need work</p>
            </div>
            <div style="font-size: 26px;">🎯</div>
        </button>
        
        <button class="setting-item" onclick="openTimeAttackMenu()">
            <div class="setting-text">
                <h4>Time Attack</h4>
                <p>Race the clock to test your speed</p>
            </div>
            <div style="font-size: 26px;">⏱️</div>
        </button>
    </div>
</div>

<div id="mistakeGameContainer" class="view-container">
    <div style="width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; box-sizing: border-box;">
        <button onclick="exitMistakeReview()" style="background: none; border: none; color: var(--secondary); font-weight: 800; font-size: 16px; cursor: pointer; padding: 0;">← Back</button>
        <span id="mistakesRemaining" style="color: var(--text-muted); font-weight: 800; font-size: 14px; text-transform: uppercase;">Remaining: 0</span>
    </div>

    <div class="rollerBox" style="margin-top: 0;">
        <div class="slot">
            <div class="reel" id="mistakeSubjectReel"></div>
        </div>
        <div class="slot">
            <div class="reel" id="mistakeWeekReel"></div>
        </div>
    </div>

    <div id="mistakePrompt"></div>

    <div id="mistakeAnswerContainer">
        <button id="toggleMistakeAnswer" onclick="toggleMistakeAnswerBtn()">▼ Show Answer ▼</button>
        <div id="mistakeAnswerContent"></div>
    </div>

    <div style="display: flex; gap: 15px; margin-top: auto; margin-bottom: 20px; width: 90%; max-width: 400px; justify-content: center;">
        <button id="mistakeNeedsWorkBtn" onclick="processMistake(false)" disabled style="flex: 1; height: 65px; border-radius: 16px; border: none; background: #ef4444; color: white; font-weight: 800; font-size: 16px; opacity: 0.5; transition: 0.2s; cursor: pointer; box-shadow: 0 4px 15px rgba(239,68,68,0.3);">Needs Work</button>
        <button id="mistakeCorrectBtn" onclick="processMistake(true)" disabled style="flex: 1; height: 65px; border-radius: 16px; border: none; background: #22c55e; color: white; font-weight: 800; font-size: 16px; opacity: 0.5; transition: 0.2s; cursor: pointer; box-shadow: 0 4px 15px rgba(34,197,94,0.3);">Correct</button>
    </div>
</div>

<div id="settingsContainer" class="view-container">
    <div class="version-tag">v<span id="app-version">Loading...</span></div>
    <h1 class="app-title" style="margin-top: 40px; margin-bottom: 20px;">Settings</h1>
    
    <div class="settings-menu">
        <button class="setting-item" onclick="toggleSound()">
            <div class="setting-text">
                <h4>Sound</h4>
                <p>Play chimes and notes</p>
            </div>
            <div class="toggle-switch" id="switch-sound"><div class="toggle-knob"></div></div>
        </button>
        
        <button class="setting-item" id="row-haptics" onclick="toggleHaptics()">
            <div class="setting-text">
                <h4>Vibration</h4>
                <p>Haptic feedback on taps</p>
            </div>
            <div class="toggle-switch" id="switch-haptics"><div class="toggle-knob"></div></div>
        </button>
        
        <button class="setting-item" onclick="toggleTurbo()">
            <div class="setting-text">
                <h4>Turbo Spin</h4>
                <p>Faster slot machine animations</p>
            </div>
            <div class="toggle-switch" id="switch-turbo"><div class="toggle-knob"></div></div>
        </button>
        
        <button class="setting-item" onclick="toggleAutoReveal()">
            <div class="setting-text">
                <h4>Auto-Reveal</h4>
                <p>Open answer automatically</p>
            </div>
            <div class="toggle-switch" id="switch-reveal"><div class="toggle-knob"></div></div>
        </button>
        
        <button class="setting-item" onclick="toggleDarkMode()">
            <div class="setting-text">
                <h4>Dark Mode</h4>
                <p>Easier on the eyes</p>
            </div>
            <div class="toggle-switch" id="switch-dark"><div class="toggle-knob"></div></div>
        </button>
    </div>
</div>

<nav class="bottom-nav">
    <button class="nav-item active" id="nav-spinner" onclick="switchMode('spinner')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg>
        <span>Spinner</span>
    </button>
    <button class="nav-item" id="nav-review" onclick="switchMode('review')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
        <span>Review</span>
    </button>
    <button class="nav-item" id="nav-challenge" onclick="switchMode('challenge')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        <span>Challenge</span>
    </button>    
    <button class="nav-item" id="nav-grid" onclick="switchMode('grid')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line></svg>
        <span>Lessons</span>
    </button>
    <button class="nav-item" id="nav-settings" onclick="switchMode('settings')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        <span>Settings</span>
    </button>
</nav>

<div id="resetConfirmOverlay">
  <div class="confirmBox">
    <h3 style="margin-top:0">Clear Progress?</h3>
    <p>This will reset all lessons in the grid.</p>
    <div style="display:flex; gap:12px; justify-content:center;">
      <button onclick="resetGridConfirmed()" style="background:var(--primary); color:white; border:none; padding:12px 20px; border-radius:12px; font-weight:700; cursor:pointer;">Yes, Reset</button>
      <button onclick="hideResetConfirm()" style="background:#f1f5f9; color:#64748b; padding:12px 20px; border:none; border-radius:12px; font-weight:700; cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

<div id="doneOverlay">
  <canvas id="confettiCanvas"></canvas>
  <div class="doneBox">
    <div class="doneActions">
      <h3 style="margin-top:0; color:var(--secondary)">Lesson Complete!</h3>
      <p>Great work — you finished all lessons for today.</p>
      <div style="display:flex; gap:12px; justify-content:center; margin-top:12px;">
        <button onclick="(function(){ resetGridConfirmed(); hideDoneOverlay(); })()" style="background:#22c55e; color:white; border:none; padding:12px 18px; border-radius:12px; font-weight:700; cursor:pointer;">Reset Lesson</button>
      </div>
    </div>
  </div>
</div>

<div id="reviewPickerOverlay" style="display: none; position: fixed; inset: 0; align-items: center; justify-content: center; background: rgba(0,0,0,0.5); z-index: 5000;">
    <div style="background: white; width: 90%; max-width: 350px; border-radius: 16px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); max-height: 80vh; display: flex; flex-direction: column;">
        <h3 id="pickerTitle" style="margin-top: 0; text-align: center; color: var(--primary);">Select</h3>
        <div id="pickerGrid" style="display: grid; gap: 10px; overflow-y: auto; padding: 10px 0;"></div>
        <button onclick="closePicker()" style="margin-top: 15px; width: 100%; padding: 12px; background: #f1f5f9; color: #64748b; border: none; border-radius: 12px; font-weight: 700; cursor: pointer;">Cancel</button>
    </div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>

</body>
</html>
